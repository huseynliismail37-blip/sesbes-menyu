<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şeş Beş Cafe & Lounge</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: #080808;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
}

/* --- ÇOXALDIILMIŞ TÜSTÜ EFFEKTİ (3 QATLI) --- */
.smoke-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
}

/* 1-ci Qat: Yavaş və Geniş Qızılı Duman */
.smoke-1 {
    position: absolute;
    top: -20%;
    left: -20%;
    width: 140%;
    height: 140%;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, transparent 65%);
    animation: smokeSlow 25s linear infinite;
}

/* 2-ci Qat: Daha Sürətli Ağ/Boz Duman */
.smoke-2 {
    position: absolute;
    top: -10%;
    left: -10%;
    width: 120%;
    height: 120%;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.06) 0%, transparent 60%);
    animation: smokeFast 15s linear infinite;
}

/* 3-cü Qat: Mərkəzdə Dalğalanan Tünd Duman */
.smoke-3 {
    position: absolute;
    top: 10%;
    left: 10%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 55%);
    animation: smokeWave 18s ease-in-out infinite alternate;
}

@keyframes smokeSlow {
    0% { transform: rotate(0deg) scale(1) translate(0, 0); }
    50% { transform: rotate(180deg) scale(1.1) translate(-20px, 20px); }
    100% { transform: rotate(360deg) scale(1) translate(0, 0); }
}

@keyframes smokeFast {
    0% { transform: rotate(360deg) scale(1.1) translate(0, 0); }
    50% { transform: rotate(180deg) scale(0.9) translate(30px, -30px); }
    100% { transform: rotate(0deg) scale(1.1) translate(0, 0); }
}

@keyframes smokeWave {
    0% { transform: scale(1) translateY(0) filter: blur(10px); }
    50% { transform: scale(1.2) translateY(-40px) filter: blur(15px); }
    100% { transform: scale(0.95) translateY(20px) filter: blur(10px); }
}

/* --- Qızılı Parıltı Zərrəcikləri --- */
.spark {
    position: fixed;
    width: 4px;
    height: 4px;
    background: #FFD700;
    border-radius: 50%;
    animation: floatUp 8s linear infinite;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
}

.spark:nth-child(1) { left: 15%; animation-delay: 0s; width: 5px; height: 5px; }
.spark:nth-child(2) { left: 40%; animation-delay: 2s; }
.spark:nth-child(3) { left: 60%; animation-delay: 4s; width: 6px; height: 6px; }
.spark:nth-child(4) { left: 85%; animation-delay: 1.5s; }
.spark:nth-child(5) { left: 25%; animation-delay: 5s; }

@keyframes floatUp {
    0% { transform: translateY(105vh) translateX(0); opacity: 0; }
    20% { opacity: 0.7; }
    80% { opacity: 0.7; }
    100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
}

/* --- 1. Giriş (Loading) Ekranı --- */
#loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    transition: opacity 0.8s ease, visibility 0.8s;
}

.intro-logo {
    width: 200px;
    height: auto;
    animation: logoGlow 2.5s ease-in-out infinite alternate;
}

@keyframes logoGlow {
    from { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); transform: scale(0.95); }
    to { filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.9)); transform: scale(1.03); }
}

.intro-title {
    color: #FFD700;
    font-size: 38px;
    margin-top: 25px;
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    font-weight: 700;
}

.intro-sub {
    color: #aaa;
    margin-top: 8px;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
}

/* --- 2. Əsas Səhifə Kontenti --- */
#main {
    opacity: 0;
    visibility: hidden;
    position: relative;
    z-index: 10;
    padding: 30px 20px;
    max-width: 500px;
    margin: 0 auto;
    text-align: center;
    transition: opacity 1s ease;
}

.main-logo {
    width: 140px;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3));
}

.notice {
    background: linear-gradient(135deg, #2b0000 0%, #150000 100%);
    border: 1px solid #FFD700;
    color: #FFD700;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 25px;
    font-size: 15px;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
    animation: pulseBorder 2.5s infinite;
}

@keyframes pulseBorder {
    50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); border-color: #fff; }
}

/* Düymələr */
.btn-container {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
}

.btn {
    flex: 1;
    padding: 16px 10px;
    background: linear-gradient(135deg, #FFD700 0%, #b8860b 100%);
    color: #000;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn.active {
    background: #fff;
    color: #000;
    box-shadow: 0 0 25px #FFD700;
    transform: scale(1.02);
}

/* Qalereya / Menyu sahəsi */
.gallery-wrapper {
    position: relative;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 215, 0, 0.1);
    border-radius: 20px;
    padding: 10px;
    margin-bottom: 30px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
}

.gallery-info {
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
}

.menu-img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    transition: opacity 0.4s ease, transform 0.4s ease;
    touch-action: pan-y;
}

.menu-img.fade-out {
    opacity: 0;
    transform: scale(0.98);
}

/* Footer */
.footer {
    margin-top: 20px;
    color: #666;
    font-size: 13px;
}

.footer-links {
    margin-top: 10px;
}

.footer-links a {
    color: #FFD700;
    text-decoration: none;
    margin: 0 10px;
    font-weight: 500;
}
</style>
</head>
<body>

<!-- Gücləndirilmiş Tüstü Fonu -->
<div class="smoke-container">
    <div class="smoke-1"></div>
    <div class="smoke-2"></div>
    <div class="smoke-3"></div>
</div>

<!-- Qızılı Zərrəciklər -->
<div class="spark"></div>
<div class="spark"></div>
<div class="spark"></div>
<div class="spark"></div>
<div class="spark"></div>

<!-- 1. Giriş Animasiya Ekranı -->
<div id="loading">
    <img class="intro-logo" src="1782540056751.png" alt="Şeş Beş">
    <h1 class="intro-title">Şeş Beş</h1>
    <p class="intro-sub">Cafe & Lounge</p>
</div>

<!-- 2. Əsas Səhifə -->
<div id="main">
    <img class="main-logo" src="1782540056751.png" alt="Logo">
    
    <div class="notice">
        ⏰ 18:00-dan sonra sadə çay verilmir!
    </div>

    <!-- Menyu Seçim Düymələri -->
    <div class="btn-container">
        <button class="btn active" id="btn-menu" onclick="switchMenu('menu')">🍽 ƏSAS MENYU</button>
        <button class="btn" id="btn-hookah" onclick="switchMenu('hookah')">💨 QƏLYAN SETLƏRİ</button>
    </div>

    <!-- Menyu Görünüşü -->
    <div class="gallery-wrapper">
        <div class="gallery-info">⇄ Sola/Sağa sürüşdürərək keçid edə bilərsiniz</div>
        <img id="menuImage" class="menu-img" src="file_0000000062dc71f4acdd5d99e0bcd385.png" alt="Menyu">
    </div>

    <!-- Footer Alt Hissə -->
    <div class="footer">
        <p>Şeş Beş Cafe © 2026</p>
        <div class="footer-links">
            <a href="tel:+994506753331">📞 Zəng Et</a> | 
            <a href="#" target="https://www.instagram.com/iamhuseinofh?igsh=aDA3YnEybjBkejlk">📷 Instagram</a>
        </div>
    </div>
</div>

<script>
const images = {
    menu: "file_0000000062dc71f4acdd5d99e0bcd385.png",
    hookah: "file_00000000ca1471f4b26349f8a01c41f7.png"
};

let currentView = 'menu';

// Giriş ekranını bağla
window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        const loadingScreen = document.getElementById("loading");
        const mainContent = document.getElementById("main");
        
        loadingScreen.style.opacity = "0";
        loadingScreen.style.visibility = "hidden";
        
        mainContent.style.visibility = "visible";
        mainContent.style.opacity = "1";
    }, 2500);
});

// Menyu dəyişdirilməsi
function switchMenu(type) {
    if (currentView === type) return;
    currentView = type;
    
    const imgElement = document.getElementById("menuImage");
    const btnMenu = document.getElementById("btn-menu");
    const btnHookah = document.getElementById("btn-hookah");
    
    if (type === 'menu') {
        btnMenu.classList.add('active');
        btnHookah.classList.remove('active');
    } else {
        btnHookah.classList.add('active');
        btnMenu.classList.remove('active');
    }
    
    imgElement.classList.add('fade-out');
    setTimeout(() => {
        imgElement.src = images[type];
        imgElement.classList.remove('fade-out');
    }, 400);
}

// Swipe (Sürüşdürmə) funksiyası
let startX = 0;
const imgElement = document.getElementById("menuImage");

imgElement.addEventListener("touchstart", function(e) {
    startX = e.touches[0].clientX;
}, {passive: true});

imgElement.addEventListener("touchend", function(e) {
    let endX = e.changedTouches[0].clientX;
    let diffX = startX - endX;
    
    if (Math.abs(diffX) > 60) {
        if (diffX > 0) {
            switchMenu('hookah');
        } else {
            switchMenu('menu');
        }
    }
}, {passive: true});
</script>

</body>
</html>
